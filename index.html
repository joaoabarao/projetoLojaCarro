<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <h3>Cadastre seu veículo para vender mais rapido</h3>
        </header>
        <div class="form-container">
            <div class="form-header">
                <p>Formulário</p>
            </div>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro</h1>
                <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixaInputs">
                        <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="title" id="title" class="block" placeholder="Digite um título" minlength="1" maxlength="30" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="preco" id="preco" class="block" placeholder="Digite o preço" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="descricao">Descrição</label>
                        <textarea name="descricao" id="descricao" class="block" placeholder="Adicione uma descrição do seu veículo" cols="30" rows="10"></textarea>
                    </div>
                    <div class="caixaInputs">
                        <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca do carro" minlength="1" maxlength="30" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                        <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo do carro" minlength="1" maxlength="30" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                        <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="Digite a kilometragem do carro" required>
                    </div>
                    <div class="caixaInputs">
                        <label for="data-compra">Data da compra <span class="campo-obrigatorio">*</span></label>
                        <input type="date" name="data-compra" id="data-compra" class="block" required>
                    </div>
                    <div class="caixaInputs">
                        <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                        <input type="radio" name="marcha" id="manual">
                        <label for="manual">Manual</label>
                        <input type="radio" name="marcha" id="auto">
                        <label for="auto">Automático</label>
                    </div>
                    <div class="caixaInputs">
                        <p>Opcionais:</p>
                        <input type="checkbox" name="caixa" id="air">
                        <label for="air">Airbag</label>
                        <input type="checkbox" name="caixa" id="pintura">
                        <label for="pintura">Pintura fosca</label>

                    </div>
                </form>
            </div>
        </div>
    </div>
<script src="script/script.js"></script>
</body>
</html>
