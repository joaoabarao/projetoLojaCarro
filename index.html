<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="cabecalho">
    </header>
    <div class="form-container">
        <div class="form-header">
            <p>Formulário</p>
        </div>
        <div class="form-body">
            <h1 class="form-titulo">Venda fácil seu carro</h1>
            <form onsubmit="salvarCarros(event)">
                <div class="caixaInputs">
                    <label for="title">Título do anúncio <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="title" id="title" class="block" placeholder="Digite um título"
                        minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs">
                    <label for="preco">Preço <span class="campo-obrigatorio">*</span></label>
                    <input type="number" inputmode="numeric" name="preco" id="preco" class="block"
                        placeholder="Digite o preço" required>
                </div>
                <div class="caixaInputs">
                    <label for="descricao">Descrição</label>
                    <textarea name="descricao" id="descricao" class="block"
                        placeholder="Adicione uma descrição do seu veículo" cols="30" rows="10"></textarea>
                </div>
                <div class="caixaInputs">
                    <label for="marca">Marca <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca do carro"
                        minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs">
                    <label for="modelo">Modelo <span class="campo-obrigatorio">*</span></label>
                    <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o modelo do carro"
                        minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs">
                    <label for="kilometragem">Kilometragem <span class="campo-obrigatorio">*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" class="block"
                        placeholder="Digite a kilometragem do carro" required>
                </div>
                <div class="caixaInputs">
                    <label for="data-compra">Data da compra <span class="campo-obrigatorio">*</span></label>
                    <input type="date" name="data-compra" id="data-compra" class="block" required>
                </div>
                <div class="caixaInputs">
                    <p>Tipo de Câmbio: <span class="campo-obrigatorio">*</span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automático</label>
                </div>
                <div class="caixaOpcional">
                    <p>Opcionais:</p>
                    <ul class="listaOpcional">
                        <li>
                            <input type="checkbox" name="opcional[]" id="airbag" value="airbag">
                            <label for="airbag">Airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="cameraRe" value="cameraRe">
                            <label for="cameraRe">Câmera de ré</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="alarme" value="alarme">
                            <label for="alarme">Alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="arCondicionado" value="arCondicionado">
                            <label for="arCondicionado">Ar condicionado</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaOpcional">
                    <ul class="listaOpcional">
                        <li>
                            <input type="checkbox" name="opcional[]" id="assistente-pista" value="assistente-pista">
                            <label for="assistente-pista">Assistente de pista</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="partidaSemChave" value="partidaSemChave">
                            <label for="partidaSemChave">Partida sem chave</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="smarthphone" value="smarthphone">
                            <label for="smarthphone">Bluetooth</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opcional[]" id="bancoDeCouro" value="bancoDeCouro">
                            <label for="bancoDeCouro">Banco de couro</label>
                        </li>
                    </ul>
                </div>
                <div class="caixaInputs">
                    <p>Fotos do carro <span class="campo-obrigatorio">*</span></p>
                    <input type="file" name="imagem" id="imagem" multiple accept="image/png, image/jpg" required>
                </div>
                <input type="submit" value="Enviar" class="btn-submit">
            </form>
            <hr>
            <h2>Carros Cadastrados</h2>
            <div id="listarCarros">

            </div>
        </div>
    </div>

    <script src="script/script.js"></script>
</body>

</html>
